<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xinny Store Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #E9CEFF 0%, #DFC4FF 100%);
            min-height: 100vh;
        }
        
        @keyframes float-up-down {
           0%, 100% { transform: translateY(0px) rotate(0deg); }
           50% { transform: translateY(-15px) rotate(10deg); }
        }
        @keyframes float-left-right {
            0%, 100% { transform: translateX(0px) rotate(0deg); }
            50% { transform: translateX(15px) rotate(-10deg); }
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }

        @keyframes dash-animation {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: -24; }
        }
        .animate-dash {
            animation: dash-animation 1s linear infinite;
        }

        .anim-float-1 { animation: float-up-down 4s ease-in-out infinite; }
        .anim-float-2 { animation: float-up-down 5s ease-in-out infinite 1.5s; }
        .anim-float-3 { animation: float-left-right 6s ease-in-out infinite; }
        .anim-float-4 { animation: float-left-right 4.5s ease-in-out infinite 2s; }
        .anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }
        .anim-spin { animation: spin-slow 8s linear infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px -10px rgba(167, 139, 250, 0.2);
        }

        .virtual-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .virtual-card:hover {
            transform: translateY(-4px);
        }
        
        ::-webkit-scrollbar {
            width: 0px;
        }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        custom: {
                            main: '#DFC4FF',
                            text: '#7e22ce'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="flex flex-col items-center py-6 px-4 text-purple-900 relative overflow-x-hidden">

    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <svg class="absolute top-[5%] left-[10%] w-8 h-8 text-white/50 anim-float-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
        <svg class="absolute top-[50%] right-[2%] w-6 h-6 text-white/50 anim-float-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-purple-600/95 backdrop-blur-sm text-white px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 flex items-center gap-2 font-medium text-sm">
        คัดลอกเลขบัญชีแล้ว
    </div>

    <div class="max-w-[420px] w-full relative z-10 space-y-5 pb-10">
        
        <div class="text-center pt-2 pb-2 relative">
            <h1 class="text-3xl font-bold tracking-tight text-white drop-shadow-md flex items-center justify-center gap-2">
                Xinny Store
            </h1>
            <p class="text-sm font-medium text-purple-900/70 mt-1">Payment & Checkout</p>
        </div>

        <div class="glass-card rounded-[40px] p-3 relative z-10">
            <div class="relative p-2 rounded-[36px] z-10">
                <svg class="absolute inset-0 w-full h-full pointer-events-none" xmlns="http://www.w3.org/2000/svg">
                     <rect x="2" y="2" width="calc(100% - 4px)" height="calc(100% - 4px)" rx="34" fill="none" stroke="#DFC4FF" stroke-width="4" stroke-dasharray="12 12" stroke-linecap="round" class="animate-dash" />
                </svg>
                <div class="rounded-[28px] overflow-hidden relative shadow-sm border-[4px] border-white">
                    <img src="New ♡ 01_20260624162939.png" alt="บัญชี Xinny Store" class="w-full h-auto object-cover" onerror="this.src='https://placehold.co/600x600/E9CEFF/7e22ce?text=Xinny+Store'">
                </div>
            </div>

            <div class="p-4 pt-6 space-y-5">
                <div class="text-center space-y-3">
                    <p class="text-[15px] font-medium leading-relaxed text-purple-900">
                        เลขบัญชีตามนี้เลยค่า <br>
                        ชื่อบัญชี <span class="text-purple-700 font-bold bg-white/50 px-3 py-1 rounded-full border border-purple-200">ณัฏฐวรรณ จันทมาพร</span>
                    </p>
                </div>

                <div class="space-y-4">
                    <div class="virtual-card relative bg-emerald-500 rounded-[24px] p-5 shadow-lg shadow-emerald-500/20 cursor-pointer border border-emerald-400" onclick="copyText('106-3-79662-6', this)">
                        <div class="relative z-10 flex flex-col gap-2">
                            <div class="flex justify-between items-center">
                                <span class="text-white font-bold text-sm">กสิกรไทย</span>
                                <span class="text-white/80 text-[12px]">คัดลอก</span>
                            </div>
                            <div class="text-white font-bold text-[22px] tracking-widest">106-3-79662-6</div>
                        </div>
                    </div>

                    <div class="virtual-card relative bg-orange-500 rounded-[24px] p-5 shadow-lg shadow-orange-500/20 cursor-pointer border border-orange-400" onclick="copyText('0887602271', this)">
                        <div class="relative z-10 flex flex-col gap-2">
                            <div class="flex justify-between items-center">
                                <span class="text-white font-bold text-sm">Wallet</span>
                                <span class="text-white/80 text-[12px]">คัดลอก</span>
                            </div>
                            <div class="text-white font-bold text-[22px] tracking-widest">0887602271</div>
                        </div>
                    </div>

                    <div class="bg-purple-200/50 rounded-[20px] p-4 border-2 border-purple-300 border-dashed">
                        <p class="text-xs text-purple-800 font-semibold text-center italic">"สลิปนี้ซื้อขายกับร้านXinny เท่านั้น"</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyText(text, element) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 1rem)';
            }, 2000);
        }
    </script>
</body>
</html>

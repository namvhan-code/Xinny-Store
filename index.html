<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xinny Store Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #E9CEFF 0%, #DFC4FF 100%);
            min-height: 100vh;
        }
        
        @keyframes float-up-down {
           0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
        }
        @keyframes float-left-right {
            0%, 100% { transform: translateX(0px) rotate(0deg); }
            50% { transform: translateX(15px) rotate(-10deg); }
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }

        @keyframes dash-animation {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: -24; }
        }
        .animate-dash {
            animation: dash-animation 1s linear infinite;
        }

        .anim-float-1 { animation: float-up-down 4s ease-in-out infinite; }
        .anim-float-2 { animation: float-up-down 5s ease-in-out infinite 1.5s; }
        .anim-float-3 { animation: float-left-right 6s ease-in-out infinite; }
        .anim-float-4 { animation: float-left-right 4.5s ease-in-out infinite 2s; }
        .anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }
        .anim-spin { animation: spin-slow 8s linear infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 40px;
            box-shadow: 0 20px 50px -10px rgba(168, 85, 247, 0.2);
        }

        .virtual-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .virtual-card:hover { transform: translateY(-4px); }
        .virtual-card:active { transform: translateY(2px) scale(0.98); }
        
        ::-webkit-scrollbar { width: 0px; }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pink: {
                            50: '#fdf2f8',
                            100: '#fce7f3',
                            200: '#fbcfe8',
                            300: '#f9a8d4',
                            400: '#f472b6',
                            500: '#ec4899',
                            600: '#db2777',
                            700: '#be185d',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="flex flex-col items-center py-6 px-4 text-pink-700 relative overflow-x-hidden">

    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <svg class="absolute top-[5%] left-[10%] w-8 h-8 text-pink-300 anim-float-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
        <svg class="absolute top-[10%] right-[8%] w-10 h-10 text-pink-200 anim-float-2" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-pink-500/95 backdrop-blur-sm text-white px-6 py-3 rounded-full shadow-xl transition-all duration-300 opacity-0 translate-y-4 pointer-events-none z-50 flex items-center gap-2 font-medium text-sm border border-pink-400">
        คัดลอกข้อมูลแล้ว
    </div>

    <div class="max-w-[420px] w-full relative z-10 space-y-5 pb-10">
        
        <div class="text-center pt-2 pb-2 relative">
            <h1 class="text-2xl font-bold tracking-tight text-pink-700 flex items-center justify-center gap-2">
                Xinny Store
            </h1>
            <p class="text-sm font-medium text-pink-500 mt-1">Payment & Checkout</p>
        </div>

        <div class="glass-card p-3 relative z-10">
            <div class="relative p-2 rounded-[36px] z-10 border-2 border-pink-200 border-dashed">
                <div class="rounded-[28px] overflow-hidden relative shadow-sm">
                    <img src="New ♡ 01_20260624162939.png" alt="บัญชี Xinny Store" class="w-full h-auto object-cover" onerror="this.src='https://placehold.co/600x600/fce7f3/ec4899?text=Xinny+Store'">
                </div>
            </div>

            <div class="p-4 pt-6 space-y-5">
                <div class="text-center space-y-3">
                    <p class="text-[15px] font-medium leading-relaxed text-pink-800">
                        เลขบัญชีตามนี้เลยค่า<br>
                        ชื่อบัญชี <span class="text-pink-600 font-bold bg-pink-100 px-3 py-1 rounded-xl border border-pink-200">ณัฏฐวรรณ จันทมาพร</span>
                    </p>
                </div>

                <div class="space-y-4">
                    <div class="virtual-card bg-gradient-to-br from-pink-300 to-pink-400 rounded-[24px] p-5 shadow-lg overflow-hidden cursor-pointer border border-pink-200" onclick="copyText('106-3-79662-6', this)">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-white font-bold">กสิกรไทย</span>
                            <span class="text-white text-xs bg-white/20 px-2 py-1 rounded-full">คัดลอก</span>
                        </div>
                        <div class="text-white font-bold text-[22px]">106-3-79662-6</div>
                    </div>

                    <div class="virtual-card bg-gradient-to-br from-pink-400 to-pink-500 rounded-[24px] p-5 shadow-lg overflow-hidden cursor-pointer border border-pink-200" onclick="copyText('088-760-2271', this)">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-white font-bold">Wallet</span>
                            <span class="text-white text-xs bg-white/20 px-2 py-1 rounded-full">คัดลอก</span>
                        </div>
                        <div class="text-white font-bold text-[22px]">088-760-2271</div>
                    </div>

                    <div class="virtual-card bg-white rounded-[24px] p-5 shadow-sm border-2 border-pink-200 cursor-pointer" onclick="copyText('สลิปนี้ซื้อขายกับร้านXinny เท่านั้น', this)">
                        <p class="text-pink-700 font-medium text-sm">"สลิปนี้ซื้อขายกับร้านXinny เท่านั้น"</p>
                        <p class="text-pink-400 text-xs mt-1">คลิกเพื่อคัดลอก</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyText(text, element) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 1rem)';
            }, 2000);
        }
    </script>
</body>
</html>
